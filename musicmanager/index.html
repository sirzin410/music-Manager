<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <title>MUSIC MANAGER</title>
</head>

<body>
    <div class="wrapper">
        <div class="top-bar">
            <i class="material-icons">expand_more</i>
            <span>Now Playing</span>
            <i class="material-icons">more_horiz</i>
        </div>

        <div class="img-area">
            <img src="https://c.saavncdn.com/238/Snokonoko-Bacardi-English-2024-20241120141215-500x500.jpg" alt="" height="100%" width="100%" style="border-radius: 12px;">
        </div>

        <div class="song-details">
            <p class="song-name">Snokonoko</p>
            <p class="artist">Benzoo,Ashapo,Exque</p>
        </div>

        <div class="progress-area">
                <audio controls>
                    <source src="/musicmanager/songs/music-1.mp3" type="audio/mp3">
                </audio>
        </div>

        <div class="controls">
            <i id="repeat-plist" class="material-icons">repeat</i>
            <i id="prev" class="material-icons">skip_previous</i>

            <div class="play-pause">
                <i class="material-icons">play_arrow</i>
            </div>

            <i id="repeat-plist" class="material-icons">skip_next</i>
            <i id="repeat-plist" class="material-icons">queue_music</i>

        </div>
    </div>


</body>

</html>
