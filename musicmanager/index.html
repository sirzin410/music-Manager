<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <title>MUSIC MANAGER</title>
</head>

<body>
    <div class="wrapper">
        <div class="top-bar">
            <i class="material-icons">expand_more</i>
            <span>Now Playing</span>
            <i class="material-icons">more_horiz</i>
        </div>

        <div class="img-area">
            <img src="https://www.interviewmagazine.com/wp-content/uploads/2023/08/230621_CA_InterviewMagazine_Tems_S07_0067.jpg" alt="" height="100%" width="100%" style="border-radius: 12px;">
        </div>

        <div class="song-details">
            <p class="song-name">Free Mind</p>
            <p class="artist">Tems</p>
        </div>
        
         <div class ="timer">
                <p class = "curr">00:00</p>
                <p class = "end">04:30</p>
            </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <audio id="music-audio" src="../musicmanager/songs/music-2.mp3"></audio>

        <div class="controls">

            <i id="repeat-plist" class="material-icons">repeat</i>
            <i id="prev" class="material-icons">skip_previous</i>

            <div class="play-pause">
                <i id="play-button" class="material-icons">play_arrow</i>
            </div>

            <i id="repeat-plist" class="material-icons">skip_next</i>
            <i id="repeat-plist" class="material-icons">queue_music</i>


        </div>

    </div>

    <script src ="app.js" ></script>


</body>

</html>
